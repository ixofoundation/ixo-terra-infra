#file: noinspection YAMLSchemaValidation
alertmanager:
  alertmanagerSpec:
    # Mount the webhook secret so config can reference it via file path
    secrets:
      - alertmanager-slack-webhook
    resources:
      requests:
        cpu: 40m
        memory: 200Mi
      limits:
        memory: 400Mi
  templateFiles:
    slack.tmpl: |-
      {{ define "slack.ixo.title" -}}
      {{ if gt (len .Alerts.Firing) 0 -}}:red_circle:{{ else -}}:large_green_circle:{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ len .Alerts.Firing }}{{ end }}] {{ if .CommonLabels.name }}{{ .CommonLabels.name }}{{ else }}{{ .CommonLabels.alertname }}{{ end }}
      {{- end }}
      {{ define "slack.ixo.context" -}}
      {{ if .Labels.pod -}}{{ .Labels.pod }}{{ if .Labels.kubernetes_namespace }} ({{ .Labels.kubernetes_namespace }}){{ end -}}
      {{ else if .Labels.instance -}}{{ .Labels.instance -}}
      {{ else -}}cluster-wide{{ end -}}
      {{- end }}
      {{ define "slack.ixo.text" -}}
      {{ if .Alerts.Firing -}}
      *Firing:*
      {{ range .Alerts.Firing -}}
      • {{ if .Labels.name }}*{{ .Labels.name }}*{{ else }}*{{ .Labels.alertname }}*{{ end }} on {{ template "slack.ixo.context" . }}
        {{ .Annotations.summary }}
      {{ end -}}
      {{ end -}}
      {{ if .Alerts.Resolved -}}
      *Resolved:*
      {{ range .Alerts.Resolved -}}
      • {{ if .Labels.name }}{{ .Labels.name }}{{ else }}{{ .Labels.alertname }}{{ end }} on {{ template "slack.ixo.context" . }}
      {{ end -}}
      {{ end -}}
      {{- end }}
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'kubernetes_namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-notifications
      routes:
        - matchers:
            - severity = critical
          repeat_interval: 1h
    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
            title: '{{ template "slack.ixo.title" . }}'
            text: '{{ template "slack.ixo.text" . }}'
            send_resolved: true
    templates:
      - /etc/alertmanager/config/*.tmpl
defaultRules:
  rules:
    alertmanager: false
    etcd: false
    configReloaders: false
    general: false
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sContainerMemoryWorkingSetBytes: true
    k8sPodOwner: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubePrometheusGeneral: false
    kubePrometheusNodeRecording: false
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: false
    network: false
    node: true
    nodeExporterAlerting: false
    nodeExporterRecording: false
    prometheus: false
    prometheusOperator: false
    windows: false
prometheus:
  additionalRulesForClusterRole:
    - apiGroups: [""]
      resources:
        - nodes/metrics
        - nodes/stats
        - nodes/proxy
      verbs: ["get", "list", "watch"]
  prometheusSpec:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 600Mi
      limits:
        memory: 900Mi
    #https://github.com/CrunchyData/postgres-operator-examples/blob/main/kustomize/monitoring/prometheus/config/prometheus.yml
    additionalScrapeConfigs:
      ${indent(6, additional_scrape_metrics)}
      - job_name: 'cvms-exporter'
        metrics_path: '/metrics'
        scheme: 'http'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [ __meta_kubernetes_service_name, __meta_kubernetes_namespace ]
            action: keep
            regex: ixo-cvms-exporter;core
          - source_labels: [ __meta_kubernetes_endpoint_port_name ]
            action: keep
            regex: metrics
      - job_name: 'hermes-telemetry'
        metrics_path: '/metrics'
        scheme: 'http'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [ __meta_kubernetes_service_name, __meta_kubernetes_namespace ]
            action: keep
            regex: hermes-telemetry;core
          - source_labels: [ __meta_kubernetes_endpoint_port_name ]
            action: keep
            regex: telemetry
      - job_name: blackbox
        metrics_path: /probe
        params:
          module: [ http_2xx ]
        static_configs:
          - targets:
              ${indent(14, blackbox_targets)}
        relabel_configs:
          - source_labels: [ __address__ ]
            target_label: __param_target
          - source_labels: [ __param_target ]
            target_label: target
          - target_label: __address__
            replacement: prometheus-blackbox-exporter.prometheus-blackbox-exporter:9115
      - job_name: 'crunchy-postgres-exporter'
        kubernetes_sd_configs:
          - role: pod
            selectors:
              - role: pod
                label: postgres-operator.crunchydata.com/crunchy-postgres-exporter=true
        relabel_configs:
          # Keep exporter port and drop all others
          - source_labels: [ __meta_kubernetes_pod_container_port_number ]
            action: keep
            regex: 9187
          # Set label for namespace
          - source_labels: [ __meta_kubernetes_namespace ]
            target_label: kubernetes_namespace
          # Set label for pod name
          - source_labels: [ __meta_kubernetes_pod_name ]
            target_label: pod
          # Convert namespace and cluster name to pg_cluster=namespace:cluster
          - source_labels: [ __meta_kubernetes_namespace,__meta_kubernetes_pod_label_postgres_operator_crunchydata_com_cluster ]
            target_label: pg_cluster
            separator: ":"
            replacement: '$1$2'
          # Convert kubernetes pod ip to ip
          - source_labels: [ __meta_kubernetes_pod_ip ]
            target_label: ip
          # Convert postgres-operator.crunchydata.com/instance to deployment
          - source_labels: [ __meta_kubernetes_pod_label_postgres_operator_crunchydata_com_instance ]
            target_label: deployment
          # Convert postgres-operator.crunchydata.com/role to role
          - source_labels: [ __meta_kubernetes_pod_label_postgres_operator_crunchydata_com_role ]
            target_label: role
      - job_name: 'loki' # Loki Scrapes
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace]
            action: keep
            regex: loki;loki
          - source_labels: [__meta_kubernetes_service_port_name]
            action: keep
            regex: http-metrics
      - job_name: 'crunchy-postgres-exporter-v4'
        kubernetes_sd_configs:
          - role: pod
            selectors:
              - role: pod
                label: crunchy-postgres-exporter=true

        relabel_configs:
          # Keep exporter port and drop all others
          - source_labels: [ __meta_kubernetes_pod_container_port_number ]
            action: keep
            regex: 9187
          # Set label for namespace
          - source_labels: [ __meta_kubernetes_namespace ]
            target_label: kubernetes_namespace
          # Set label for pod name
          - source_labels: [ __meta_kubernetes_pod_name ]
            target_label: pod
          # Convert namespace and cluster name to pg_cluster=namespace:cluster
          - source_labels: [ __meta_kubernetes_namespace,__meta_kubernetes_pod_label_pg_cluster ]
            target_label: pg_cluster
            separator: ":"
            replacement: '$1$2'
          # Convert kubernetes pod ip to ip
          - source_labels: [ __meta_kubernetes_pod_ip ]
            target_label: ip
          # Set deployment_name as deployment label
          - source_labels: [ __meta_kubernetes_pod_label_deployment_name ]
            target_label: deployment
          # Set label for role
          - source_labels: [ __meta_kubernetes_pod_label_role ]
            target_label: role
    rule_files:
      - /etc/prometheus/alert-rules.d/*.yml
    alerting:
      alertmanagers:
        - kubernetes_sd_configs:
            - role: pod
              selectors:
                - role: pod
                  label: app.kubernetes.io/component=crunchy-alertmanager
        - kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - prometheus
              selectors:
                - role: pod
                  label: app.kubernetes.io/name=alertmanager
grafana:
  sidecar:
    skipTlsVerify: true
  plugins:
    - nline-plotlyjs-panel
  env:
    CLIENT_SECRET: ${grafana_oidc_secret}
  deploymentStrategy:
    type: Recreate
  livenessProbe:
    initialDelaySeconds: 60
  readinessProbe:
    initialDelaySeconds: 60
  persistence:
    enabled: true
    type: pvc
    storageClassName: ${storage_class}
    accessModes:
      - ReadWriteOnce
    size: 40Gi
    finalizers:
      - kubernetes.io/pvc-protection
  grafana.ini:
    database:
      wal: true
      cache_mode: shared
      migration_locking: false
    auth.generic_oauth:
      client_id: grafana-client
      client_secret: $__env{CLIENT_SECRET}
      auth_url: https://${dex_host}/auth
      api_url: https://${dex_host}/userinfo
      token_url: https://${dex_host}/token
      scopes: 'openid profile email groups'
      use_refresh_token: true
      groups_attribute_path: 'groups'
      allowed_groups: '${org}:ixo_core, ${org}:${environment}-devsecops'
      role_attribute_path: contains(groups[*], '${org}:${environment}-devsecops') && 'GrafanaAdmin' || 'Viewer'
      allow_assign_grafana_admin: false
      enabled: true
    server:
      domain: ${host}
      protocol: http
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
  ingress:
    enabled: false  # Routing via F5 VirtualServer (prometheus-stack-host) and VirtualServerRoute grafana-route
    ingressClassName: nginx
    annotations:
      nginx.org/mergeable-ingress-type: "minion"
      nginx.org/path-regex: "case_insensitive"
      cert-manager.io/cluster-issuer: letsencrypt-staging
    hosts:
      - ${host}
    path: /grafana(/|$)(.*)
    pathType: ImplementationSpecific
    tls:
      - secretName: grafana-tls
        hosts:
          - ${host}
  additionalDataSources:
    - name: loki
      access: proxy
      type: loki
      url: http://loki.loki.svc.cluster.local:3100
prometheusOperator:
  prometheusConfigReloader:
    resources:
      request:
        cpu: 50m
        memory: 50Mi
      limits:
        memory: 50Mi
  admissionWebhooks:
    deployment:
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 200Mi
  tls:
    enabled: true
  resources:
    limits:
      memory: 200Mi
    requests:
      memory: 100Mi
      cpu: 100m
additionalPrometheusRulesMap:
  ixo-infrastructure-rules:
    groups:
      - name: ixo.postgres
        rules:
          - alert: PostgresInstanceDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
              name: PostgresInstanceDown
            annotations:
              summary: "{{ $labels.pod }} in {{ $labels.kubernetes_namespace }} is unreachable"

          - alert: PostgresConnectionSaturation
            # pg_stat_database_numbackends is per-database; sum to get total per instance
            expr: |
              sum by (instance, pod, kubernetes_namespace, pg_cluster, role) (pg_stat_database_numbackends)
              / on (instance, pod, kubernetes_namespace, pg_cluster, role)
              pg_settings_max_connections > 0.80
            for: 5m
            labels:
              severity: warning
              name: PostgresConnectionSaturation
            annotations:
              summary: "{{ $labels.pod }} ({{ $labels.pg_cluster }}) connections at {{ $value | humanizePercentage }}"

          - alert: PostgresLongRunningTransaction
            # Excludes system databases; fires if any transaction has been open > 5 minutes
            expr: |
              pg_stat_activity_max_tx_duration{datname!~"template.*|postgres"} > 300
            for: 2m
            labels:
              severity: warning
              name: PostgresLongRunningTransaction
            annotations:
              summary: "{{ $labels.pod }} in {{ $labels.kubernetes_namespace }} has a transaction open for {{ $value | humanizeDuration }}"

          - alert: PostgresReplicationLag
            # Fires only on replicas; alert if replica is > 5 minutes behind primary
            expr: pg_replication_lag_seconds{role="replica"} > 300
            for: 5m
            labels:
              severity: warning
              name: PostgresReplicationLag
            annotations:
              summary: "{{ $labels.pod }} ({{ $labels.pg_cluster }}) replica is {{ $value | humanizeDuration }} behind primary"

      - name: ixo.node
        rules:
          - alert: NodeMemoryPressure
            # Fires when less than 10% of RAM is available on a node
            expr: |
              node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
            for: 5m
            labels:
              severity: critical
              name: NodeMemoryPressure
            annotations:
              summary: "{{ $labels.instance }} has {{ $value | humanizePercentage }} memory available"

          - alert: NodeCPUSaturation
            # Fires when CPU has been > 90% busy for 10 minutes
            expr: |
              avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) < 0.10
            for: 10m
            labels:
              severity: warning
              name: NodeCPUSaturation
            annotations:
              summary: "{{ $labels.instance }} CPU is {{ $value | humanizePercentage }} idle"

          - alert: NodeInodeExhaustion
            # Inode exhaustion is independent of disk space — writes fail when inodes run out
            # Excludes tmpfs/overlay/squashfs which are virtual and have fixed counts
            expr: |
              node_filesystem_files_free{fstype!~"tmpfs|overlay|squashfs"}
              / node_filesystem_files{fstype!~"tmpfs|overlay|squashfs"} < 0.10
            for: 5m
            labels:
              severity: warning
              name: NodeInodeExhaustion
            annotations:
              summary: "{{ $labels.instance }} {{ $labels.mountpoint }} has {{ $value | humanizePercentage }} inodes free"

      - name: ixo.loki
        rules:
          - alert: LokiIngestionDropped
            # Loki discarding samples means gaps in log observability
            expr: |
              sum by (reason) (rate(loki_discarded_samples_total[5m])) > 0
            for: 5m
            labels:
              severity: warning
              name: LokiIngestionDropped
            annotations:
              summary: "Loki dropping {{ $value | humanize }} samples/s (reason: {{ $labels.reason }})"

          - alert: LokiQueryLatencyHigh
            # p99 query latency > 30s means Grafana dashboards hang during incidents
            expr: |
              histogram_quantile(0.99,
                sum by (le) (
                  rate(loki_request_duration_seconds_bucket{route=~"loki_api_v1_query_range|loki_api_v1_query"}[5m])
                )
              ) > 30
            for: 5m
            labels:
              severity: warning
              name: LokiQueryLatencyHigh
            annotations:
              summary: "Loki query p99 latency is {{ $value | humanizeDuration }}"