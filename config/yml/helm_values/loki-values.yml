deploymentMode: SingleBinary # TODO migrate to SimpleScalable or Distributed for HA when load increases
loki:
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  memberlistConfig:
    join_members:
      - loki-memberlist.loki.svc.cluster.local
  ingester:
    lifecycler:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1
  distributor:
    ring:
      kvstore:
        store: inmemory
  compactor:
    retention_enabled: true
    compaction_interval: 10m
    working_directory: /var/loki/data/retention
    retention_delete_delay: 2h
    retention_delete_worker_count: 10
    delete_request_store: filesystem
  ruler:
    ring:
      kvstore:
        store: inmemory
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  podSecurityContext:
    fsGroupChangePolicy: "OnRootMismatch"
  storage_config:
    gcs:
      bucket_name: ${gcs_bucket}
      service_account: |
        ${service_account}
  limits_config:
    max_label_names_per_series: 20
    # Prevent ingestion drops for occasional huge lines (stack traces, JSON blobs).
    # Prefer fixing at the source, but truncation is safer than losing the entire line.
    max_line_size: 262144
    max_line_size_truncate: true
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    retention_period: 730h
    retention_stream:
      - selector: '{namespace="core"}'
        priority: 1
        period: 2160h
      - selector: '{namespace="ixo-ingress"}'
        priority: 1
        period: 2160h
  schemaConfig:
    configs:
      - from: "2025-01-01"
        object_store: filesystem
        store: tsdb
        schema: v13
        index:
          prefix: "index_"
          period: 24h
memberlist:
  service:
    publishNotReadyAddresses: true
chunksCache:
  enabled: true
  allocatedMemory: 512
compactor:
  replicas: 0
singleBinary:
  replicas: 1
  persistence:
    enableStatefulSetAutoDeletePVC: false
    enableStatefulSetRecreationForSizeChange: true
    storageClass: ${storage_class}
    size: 80Gi
  extraEnv:
    # Tell Go's GC to start collecting at 3.5Gi so it doesn't get OOMKilled at the 4Gi limit
    - name: GOMEMLIMIT
      value: "3758096384" # 3.5Gi in bytes
  resources:
    requests:
      memory: 2Gi
      cpu: 100m
    limits:
      memory: 4Gi
read:
  persistence:
    storageClass: ${storage_class}
    size: 40Gi
  replicas: 0 #TODO * DISTRIBUTED deployment setup.
  resources:
    requests:
      memory: 256Mi
      cpu: 150m
    limits:
      memory: 256Mi
backend:
  persistence:
    storageClass: ${storage_class}
    size: 40Gi
  replicas: 0
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 512Mi
write:
  persistence:
    storageClass: ${storage_class}
    size: 40Gi
  replicas: 0
  resources:
    requests:
      memory: 256Mi
      cpu: 150m
    limits:
      memory: 256Mi
sidecar:
  skipTlsVerify: true
monitoring:
  rules:
    alerting: false
  selfMonitoring:
    enabled: true
    grafanaAgent:
      resources:
        limits:
          memory: 200Mi
        requests:
          cpu: 50m
          memory: 100Mi
    podLogs:
      additionalPipelineStages:
        - labelDrop:
            - filename
            # Drop high-cardinality/low-value k8s system labels captured by the broad labelmap rule.
            # These push streams over max_label_names_per_series (20) causing ingestion drops.
            - controller_revision_hash
            - statefulset_kubernetes_io_pod_name
            - apps_kubernetes_io_pod_index
            - app_kubernetes_io_managed_by
            - app_kubernetes_io_version
            - helm_sh_chart
            - pod_template_hash
            - pod_template_generation
