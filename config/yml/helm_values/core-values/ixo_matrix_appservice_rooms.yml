image:
  pullPolicy: Always
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    acme.cert-manager.io/http01-edit-in-place: "true"
  tls:
    - hosts:
        - ${host}
      secretName: ixo-matrix-appservice-rooms-tls
  hosts:
    - host: ${host}
      paths:
        - path: /
          pathType: Prefix
persistentVolume:
  storageClass: ${storage_class}
  size: ${storage_size}
service:
  port: 8081
env:
  - name: "PORT"
    value: "8081"
resources:
  requests:
    memory: 100Mi
    cpu: "40m"
  limits:
    memory: 200Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetMemoryUtilizationPercentage: "30"
backup:
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi
  gcs:
    bucket: ${gcs_bucket}