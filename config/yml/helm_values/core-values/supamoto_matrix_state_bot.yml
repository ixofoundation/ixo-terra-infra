image:
  pullPolicy: Always
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: ${host}
      paths:
        - path: /
          pathType: Prefix
persistentVolume:
  storageClass: ${storage_class}
  size: ${storage_size}
service:
  port: 8080
env:
  - name: "PORT"
    value: "8080"
resources:
  requests:
    memory: 200Mi
    cpu: "40m"
  limits:
    memory: 350Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetMemoryUtilizationPercentage: "30"
backup:
  resources:
    requests:
      cpu: 10m
      memory: 350Mi
    limits:
      memory: 550Mi
  gcs:
    bucket: ${gcs_bucket}
config:
  homeserverUrl: https://matrix.supamoto.global
  accessToken: "<path:ixo_core/data/matrix#MATRIX_SUPAMOTO_STATE_BOT_ACCESS_TOKEN>"
  ucan:
    hostname: state.bot.matrix.supamoto.global