image:
  repository: ghcr.io/ixofoundation/ixo-terra-infra/hermes
  pullPolicy: Always
resources:
  requests:
    memory: 200Mi
    cpu: "50m"
  limits:
    memory: 350Mi
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    acme.cert-manager.io/http01-edit-in-place: "true"
  tls:
    - hosts:
        - ${host}
      secretName: ixo-hermes-tls
  hosts:
    - host: ${host}
      paths:
        - path: /
          pathType: Prefix