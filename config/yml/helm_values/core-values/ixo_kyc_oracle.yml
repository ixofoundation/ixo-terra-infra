image:
  pullPolicy: Always
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    acme.cert-manager.io/http01-edit-in-place: "true"
  tls:
    - hosts:
        - ${host}
      secretName: ixo-kyc-oracle-tls
  hosts:
    - host: ${host}
      paths:
        - path: /
          pathType: Prefix
env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "4000"
  - name: ORACLE_NAME
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#ORACLE_NAME>"
  # Network
  - name: NETWORK
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#NETWORK>"
  - name: RPC_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#RPC_URL>"
  - name: BLOCKSYNC_GRAPHQL_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#BLOCKSYNC_GRAPHQL_URL>"
  - name: BLOCKSYNC_URI
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#BLOCKSYNC_URI>"
  # Matrix
  - name: MATRIX_BASE_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_BASE_URL>"
  - name: MATRIX_ORACLE_ADMIN_ACCESS_TOKEN
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_ORACLE_ADMIN_ACCESS_TOKEN>"
  - name: MATRIX_ORACLE_ADMIN_PASSWORD
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_ORACLE_ADMIN_PASSWORD>"
  - name: MATRIX_ORACLE_ADMIN_USER_ID
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_ORACLE_ADMIN_USER_ID>"
  - name: MATRIX_RECOVERY_PHRASE
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_RECOVERY_PHRASE>"
  - name: MATRIX_VALUE_PIN
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_VALUE_PIN>"
  - name: MATRIX_ACCOUNT_ROOM_ID
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MATRIX_ACCOUNT_ROOM_ID>"
  # Blockchain
  - name: SECP_MNEMONIC
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#SECP_MNEMONIC>"
  - name: ORACLE_ENTITY_DID
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#ORACLE_ENTITY_DID>"
  # Database
  - name: REDIS_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#REDIS_URL>"
  # LLM
  - name: OPENAI_API_KEY
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#OPENAI_API_KEY>"
  - name: OPEN_ROUTER_API_KEY
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#OPEN_ROUTER_API_KEY>"
  # External Services
  - name: MEMORY_MCP_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MEMORY_MCP_URL>"
  - name: MEMORY_ENGINE_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#MEMORY_ENGINE_URL>"
  - name: FIRECRAWL_MCP_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#FIRECRAWL_MCP_URL>"
  - name: DOMAIN_INDEXER_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#DOMAIN_INDEXER_URL>"
  - name: SANDBOX_MCP_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#SANDBOX_MCP_URL>"
  # Observability
  - name: LANGSMITH_TRACING
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#LANGSMITH_TRACING>"
  - name: LANGSMITH_ENDPOINT
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#LANGSMITH_ENDPOINT>"
  - name: LANGSMITH_API_KEY
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#LANGSMITH_API_KEY>"
  - name: LANGSMITH_PROJECT
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#LANGSMITH_PROJECT>"
  # Misc
  - name: DISABLE_CREDITS
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#DISABLE_CREDITS>"
  - name: CORS_ORIGIN
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#CORS_ORIGIN>"
  - name: SUBSCRIPTION_URL
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#SUBSCRIPTION_URL>"
  - name: ORACLE_SECRETS
    value: "<path:${vault_mount}/data/ixo-kyc-oracle#ORACLE_SECRETS>"
service:
  port: 4000
resources:
  requests:
    memory: 256Mi
    cpu: "50m"
  limits:
    memory: 350Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 1
  targetMemoryUtilizationPercentage: "30"