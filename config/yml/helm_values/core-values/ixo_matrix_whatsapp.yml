persistentVolume:
  storageClass: ${storage_class}
  size: ${storage_size}
appservice:
  address: "http://ixo-matrix-whatsapp.matrix-synapse.svc.cluster.local:8008"
  as_token: "${as_token}"
  hs_token: "${hs_token}"
homeserver:
  address: "http://matrix-synapse.matrix-synapse.svc.cluster.local:8008"
  domain: "${matrix_domain}"
database:
  uri: "${postgres_uri}"
permissions:
  "*": relay
  "${matrix_domain}": user
encryption:
  allow: false
  default: false
  require: false
resources:
  requests:
    memory: 128Mi
    cpu: "50m"
  limits:
    memory: 256Mi
