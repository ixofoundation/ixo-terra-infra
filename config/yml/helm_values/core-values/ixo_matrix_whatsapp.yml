persistentVolume:
  storageClass: ${storage_class}
  size: ${storage_size}
appservice:
  address: "http://ixo-matrix-whatsapp.matrix-synapse.svc.cluster.local:8008"
  as_token: "${as_token}"
  hs_token: "${hs_token}"
homeserver:
  address: "http://matrix-synapse.matrix-synapse.svc.cluster.local:8008"
  domain: "${matrix_domain}"
database:
  uri: "${postgres_uri}"
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    acme.cert-manager.io/http01-edit-in-place: "true"
  tls:
    - hosts:
        - ${host}
      secretName: ixo-matrix-whatsapp-tls
  hosts:
    - host: ${host}
      paths:
        - path: /
          pathType: Prefix
permissions:
  "*": relay
  "${matrix_domain}": user
encryption:
  allow: true
  default: true
  require: false
resources:
  requests:
    memory: 128Mi
    cpu: "50m"
  limits:
    memory: 256Mi
