searxng:
  config:
    use_default_settings: true
    server:
      secret_key: "<path:${vault_mount}/data/searxng#SECRET_KEY>"
      bind_address: "0.0.0.0:8080"
    search:
      formats:
        - html
        - json
    engines:
      - name: google_search
        engine: google
        disabled: false
        weight: 2
      - name: bing
        engine: bing
        disabled: false
        weight: 1
      - name: duckduckgo_search
        engine: duckduckgo
        disabled: false
        weight: 1