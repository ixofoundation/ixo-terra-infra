apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${name}
  namespace: ${argo_namespace}
spec:
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
    # cert-manager http01-edit-in-place temporarily modifies spec.rules to serve the ACME challenge.
    # RespectIgnoreDifferences=true below ensures ArgoCD does not overwrite these during sync.
    - group: networking.k8s.io
      kind: Ingress
      jqPathExpressions:
        - '.spec.rules'
  destination:
    namespace: ${namespace}
    server: https://kubernetes.default.svc
  project: default
  source:
    plugin:
      name: avp
      env:
        - name: HELM_VALUES
          value: |
            ${indent(12, helm_values)}
    path: ${path}
    repoURL: ${repository}
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true